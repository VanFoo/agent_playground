# devisolation firewall — squid.conf
#
# Forward proxy for the `devcontainer` service. Default-deny: only domains
# listed in whitelist.txt are reachable, over HTTP/HTTPS only.
#
# HTTPS handling is "peek, stare, splice" — NOT full TLS interception:
#   1. peek  — read the plaintext SNI from the TLS ClientHello to learn the
#              claimed destination domain.
#   2. stare — for whitelisted SNI only, complete enough of Squid's own
#              handshake with the real upstream server to see its actual
#              certificate, and verify that cert matches the claimed SNI.
#   3. splice — if the cert matches, relay the rest of the connection
#              untouched (still end-to-end encrypted, never decrypted).
#              If the cert does NOT match the claimed SNI — i.e. someone
#              inside the devcontainer is claiming an allowed domain via
#              SNI while actually talking to a different server — the
#              connection is terminated instead of spliced.
#
# This closes the classic "SNI spoofing" gap in naive peek-and-splice
# proxies, where only the claimed SNI string is checked and the actual
# destination is never verified.
#
# NOTE: ssl_bump/ssl::cert_errors directive availability and exact error
# token names can shift between Squid versions. Validate this file after
# building with `docker compose exec firewall squid -k parse` and smoke
# test against an allowed domain, a disallowed domain, and ideally a
# spoofed-SNI connection before relying on this as a real security boundary.

acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Domain whitelist, one entry per line. After editing whitelist.txt, reload
# without restarting the container:
#   docker compose exec firewall squid -k reconfigure
acl whitelist dstdomain "/etc/squid/whitelist.txt"
acl whitelist_sni ssl::server_name "/etc/squid/whitelist.txt"

http_port 3128 ssl-bump generate-host-certificates=on dynamic_cert_mem_cache_size=4MB cert=/etc/squid/dummy.pem

acl step1 at_step SslBump1
acl step2 at_step SslBump2

# Populated once Squid "stares" at the real upstream server's certificate
# (step 2). A domain-mismatch error here means the claimed SNI doesn't match
# the actual server's certificate.
acl certMismatch ssl::cert_errors SQUID_X509_V_ERR_DOMAIN_MISMATCH

ssl_bump peek step1
ssl_bump stare step2 whitelist_sni
ssl_bump terminate certMismatch
ssl_bump splice whitelist_sni
ssl_bump terminate all

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet CONNECT whitelist
http_access allow localnet whitelist
http_access deny all

cache_effective_user proxy
cache_effective_group proxy

# Denied requests land here with the attempted domain — this is how you
# find out what to add to whitelist.txt when something breaks:
#   docker compose logs -f firewall
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Access control only, not a caching proxy.
cache deny all
